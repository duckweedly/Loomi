openapi: 3.1.0
info:
  title: Loomi M4 Run, Event, and SSE API
  version: 0.1.0
  description: Local-development API contract for M4 runs, run events, cooperative stop, and history recovery.
servers:
  - url: http://127.0.0.1:8080
    description: Local Loomi API service
paths:
  /v1/threads/{thread_id}/runs:
    post:
      summary: Start a deterministic local run for an owned active thread
      operationId: startRun
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartRunRequest'
      responses:
        '201':
          description: Run created and started or pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '404':
          $ref: '#/components/responses/ThreadNotFound'
        '409':
          $ref: '#/components/responses/ActiveRunConflict'
  /v1/threads/{thread_id}/runs/current:
    get:
      summary: Return the current active or latest run for an owned thread
      operationId: getCurrentThreadRun
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      responses:
        '200':
          description: Current or latest run for the thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        '404':
          $ref: '#/components/responses/RunNotFound'
  /v1/runs/{run_id}:
    get:
      summary: Retrieve one owned run
      operationId: getRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Owned run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        '404':
          $ref: '#/components/responses/RunNotFound'
  /v1/runs/{run_id}/events:
    get:
      summary: List persisted events for one owned run
      operationId: listRunEvents
      parameters:
        - $ref: '#/components/parameters/RunId'
        - name: after_sequence
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Return events with sequence greater than this value.
      responses:
        '200':
          description: Ordered run events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunEventListResponse'
        '404':
          $ref: '#/components/responses/RunNotFound'
  /v1/runs/{run_id}/stop:
    post:
      summary: Request best-effort cooperative stop for an owned active run
      operationId: stopRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Stop request result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StopRunResponse'
        '404':
          $ref: '#/components/responses/RunNotFound'
  /v1/runs/{run_id}/events/stream:
    get:
      summary: Stream persisted history followed by live run events
      operationId: streamRunEvents
      parameters:
        - $ref: '#/components/parameters/RunId'
        - name: after_sequence
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Start history delivery after this sequence.
      responses:
        '200':
          description: text/event-stream with history then live run events
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/RunNotFound'
components:
  parameters:
    ThreadId:
      name: thread_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
  responses:
    InvalidRequest:
      description: Invalid client request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ThreadNotFound:
      description: Thread is absent, archived, or not owned by the fixed local identity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RunNotFound:
      description: Run is absent or not owned by the fixed local identity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ActiveRunConflict:
      description: Thread already has an active run
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    StartRunRequest:
      type: object
      properties:
        script_name:
          type: string
          description: Optional deterministic local script label. Defaults to the M4 smoke script.
      additionalProperties: false
    RunResponse:
      type: object
      required: [run, request_id]
      properties:
        run:
          $ref: '#/components/schemas/Run'
        request_id:
          type: string
    RunEventListResponse:
      type: object
      required: [events, request_id]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/RunEvent'
        request_id:
          type: string
    StopRunResponse:
      type: object
      required: [run, result, request_id]
      properties:
        run:
          $ref: '#/components/schemas/Run'
        result:
          type: string
          enum: [stopped, already_terminal]
        request_id:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
              enum: [invalid_request, thread_not_found, run_not_found, active_run_exists, method_not_allowed, internal_error]
            message:
              type: string
            request_id:
              type: string
    Run:
      type: object
      required: [id, thread_id, status, source, title, created_at, updated_at]
      properties:
        id:
          type: string
        thread_id:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, stopped]
        source:
          type: string
          enum: [local_simulated]
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: [string, 'null']
          format: date-time
        error_code:
          type: [string, 'null']
        error_message:
          type: [string, 'null']
    RunEvent:
      type: object
      required: [id, run_id, thread_id, sequence, category, type, summary, metadata, created_at]
      properties:
        id:
          type: string
        run_id:
          type: string
        thread_id:
          type: string
        sequence:
          type: integer
          minimum: 1
        category:
          type: string
          enum: [lifecycle, progress, message, error, final]
        type:
          type: string
        summary:
          type: string
        content:
          type: [string, 'null']
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
